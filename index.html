<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Society Simulator</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- daisyUI for beautiful Tailwind components -->
    <script src="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.js"></script>
    <!-- Inter font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <!-- AOS (Animate On Scroll) for smooth UI animations -->
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; background: linear-gradient(120deg, #232946 0%, #1a1a2e 100%); }
        /* Soft vignette effect for game area */
        #game-container::before {
            content: '';
            position: absolute;
            left: 0; top: 0; right: 0; bottom: 0;
            pointer-events: none;
            border-radius: 2rem;
            box-shadow: 0 0 0 9999px rgba(30,41,59,0.18) inset, 0 0 80px 8px rgba(60,130,246,0.08) inset;
            z-index: 1;
        }
    </style>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="sidebar.css">
    <!-- three.jsとOrbitControlsはESMでimportするためscriptタグ不要 -->
    <script type="module" src="main.js"></script>
    <script type="module" src="sidebar.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 flex flex-col items-center justify-center min-h-screen p-4">
    <div id="sidebar-left" class="sidebar-bg"></div>
    <div id="sidebar-right" class="sidebar-bg-right" style="display:none;"></div>
    <h1 class="mb-5 font-bold" data-aos="fade-down">Voxel Society Simulator</h1>
    <p class="mb-8 text-center max-w-2xl" data-aos="fade-up" data-aos-delay="100">
        彼らは経験から学び、性格を変化させます。その個性は、体の色にも現れます。<br>
        私たちは、彼らの文明の発展を観察します。
    </p>
    <!-- Debug toggle moved outside the game screen/card -->
    <div class="w-full max-w-6xl flex justify-start mb-4">
        <div class="bg-gray-800 bg-opacity-60 p-3 rounded-xl shadow">
            <label class="flex items-center space-x-2 text-white">
                <input type="checkbox" id="debugToggle" class="checkbox">
                <span class="font-semibold">デバッグ情報を表示</span>
            </label>
        </div>
    </div>
    <div id="game-container" class="relative w-full max-w-6xl flex justify-center mb-12" data-aos="zoom-in" data-aos-delay="200">
        <div class="relative w-full max-w-5xl card p-6" style="margin-left:360px;">
            <canvas id="gameCanvas" width="800" height="600" style="background:#222; border-radius:1rem; display:block;"></canvas>
            <canvas id="minimapCanvas" width="96" height="96" class="absolute top-6 right-6" style="background:#111; border-radius:0.5rem; display:block;"></canvas>
        </div>
    </div>
    <div id="messageBox" class="hidden fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 p-8 rounded-2xl shadow-2xl z-50" data-aos="fade-in" data-aos-delay="300">
        <p id="messageText" class="text-xl font-bold mb-6"></p>
        <button id="messageBoxCloseBtn" class="btn w-full px-6 py-3 font-bold transition-all duration-200">閉じる</button>
    </div>
    <script>
        // Only UI initialization and AOS setup should be here
        document.addEventListener('DOMContentLoaded', function() {
            AOS.init({ once: true });
        });
        // All game logic is now in game.js
    </script>
</body>
</html>
