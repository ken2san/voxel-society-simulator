<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Society Simulator</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- daisyUI for beautiful Tailwind components -->
    <script src="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.js"></script>
    <!-- Inter font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <!-- AOS (Animate On Scroll) for smooth UI animations -->
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; background: linear-gradient(120deg, #232946 0%, #1a1a2e 100%); }
        /* Soft vignette effect for game area */
        #game-container::before {
            content: '';
            position: absolute;
            left: 0; top: 0; right: 0; bottom: 0;
            pointer-events: none;
            border-radius: 2rem;
            box-shadow: 0 0 0 9999px rgba(30,41,59,0.18) inset, 0 0 80px 8px rgba(60,130,246,0.08) inset;
            z-index: 1;
        }

        .telemetry-modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 70;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(8, 12, 28, 0.62);
            backdrop-filter: blur(4px);
        }

        .telemetry-modal-overlay.hidden {
            display: none;
        }

        .telemetry-modal-card {
            width: min(680px, calc(100vw - 32px));
            border-radius: 16px;
            border: 1px solid rgba(176, 200, 224, 0.38);
            background: linear-gradient(160deg, rgba(25, 34, 62, 0.98) 0%, rgba(18, 25, 46, 0.98) 100%);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
            color: #ecf3ff;
            padding: 16px;
        }

        .debug-action-btn {
            min-width: 140px;
            font-weight: 700;
            letter-spacing: 0.01em;
            border-width: 1px;
            border-color: rgba(196, 222, 255, 0.35);
            box-shadow: 0 8px 20px rgba(10, 16, 36, 0.38), inset 0 1px 0 rgba(255, 255, 255, 0.18);
            transition: transform 120ms ease, box-shadow 120ms ease;
        }

        .debug-action-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 24px rgba(10, 16, 36, 0.42), inset 0 1px 0 rgba(255, 255, 255, 0.24);
        }

        .debug-action-btn:active {
            transform: translateY(1px);
            box-shadow: 0 4px 10px rgba(10, 16, 36, 0.35), inset 0 2px 4px rgba(0, 0, 0, 0.3);
        }
    </style>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="sidebar.css">
    <!-- Import map for Three.js ESM imports -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.178.0/build/three.module.js",
            "three/examples/jsm/controls/OrbitControls.js": "https://cdn.jsdelivr.net/npm/three@0.178.0/examples/jsm/controls/OrbitControls.js"
        }
    }
    </script>
    <script type="module" src="main.js"></script>
    <script type="module" src="sidebar.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 flex flex-col items-center justify-center min-h-screen p-4">
    <div id="sidebar-left" class="sidebar-bg"></div>
    <div id="sidebar-right" class="sidebar-bg-right"></div>
    <h1 class="mb-5 font-bold" data-aos="fade-down">Voxel Society Simulator</h1>

    <!-- Debug launcher -->
    <div class="mb-3 text-center max-w-2xl mx-auto">
        <div class="inline-flex items-center gap-2 bg-gray-800 bg-opacity-60 p-2 rounded-xl shadow">
            <button id="debugPanelOpenBtn" class="btn btn-info btn-md debug-action-btn">Open Debug Panel</button>
        </div>
    </div>

    <div id="debugControlModal" class="telemetry-modal-overlay hidden" aria-hidden="true" inert>
        <div class="telemetry-modal-card">
            <div class="flex items-center justify-between mb-3">
                <h3 class="text-white font-semibold">Debug Manager</h3>
                <button id="debugPanelCloseBtn" class="btn btn-ghost btn-sm">Close</button>
            </div>
            <div class="bg-slate-900/50 border border-slate-400/20 rounded-lg p-3 mb-3">
                <div class="text-white font-semibold mb-2">Debug Info</div>
                <label class="inline-flex items-center gap-2 text-gray-200 text-sm">
                    <input type="checkbox" id="debugToggle" class="checkbox checkbox-sm">
                    <span>Show Debug Info (console logs)</span>
                </label>
            </div>

            <div class="bg-slate-900/50 border border-slate-400/20 rounded-lg p-3">
            <div class="text-white font-semibold mb-2">Telemetry</div>
            <p class="text-gray-300 text-sm mb-3">Capture reproducible runtime logs separately from Debug Info.</p>
            <div class="flex flex-wrap items-center justify-center gap-2 mb-2">
                <button id="telemetryStartBtn" class="btn btn-success btn-md debug-action-btn">Start Capture</button>
                <button id="telemetryStopBtn" class="btn btn-warning btn-md debug-action-btn">Stop Capture</button>
                <button id="telemetryDownloadBtn" class="btn btn-info btn-md debug-action-btn">Download JSON</button>
            </div>
            <div class="flex items-center justify-center gap-2 text-sm text-gray-300 mb-2">
                <label class="inline-flex items-center gap-2">
                    <input type="checkbox" id="telemetryAutoDownloadToggle" checked>
                    <span>Auto-download on Stop</span>
                </label>
            </div>
            <div id="telemetryStatus" class="text-xs text-gray-300 text-center">Telemetry idle</div>
            </div>
        </div>
    </div>

    <!-- Resource Generation Settings -->
    <div class="mb-4 text-center max-w-6xl mx-auto">
        <div class="bg-gray-800 bg-opacity-60 p-3 rounded-xl shadow">
            <h3 class="text-white font-semibold mb-3">Resource Generation Settings</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-3">
                <!-- Tree Spawn Rate -->
                <div class="bg-gray-700 bg-opacity-50 p-3 rounded-lg">
                    <label class="block text-sm font-medium text-gray-300 mb-2">🌲 Tree Spawn Rate</label>
                    <input type="range" id="treeSlider" min="0" max="1" step="0.05" value="0.35" class="range range-primary w-full">
                    <div class="flex justify-between text-xs text-gray-400 mt-1">
                        <span>0%</span>
                        <span id="treeValue">35%</span>
                        <span>100%</span>
                    </div>
                </div>

                <!-- Leaf Spawn Rate -->
                <div class="bg-gray-700 bg-opacity-50 p-3 rounded-lg">
                    <label class="block text-sm font-medium text-gray-300 mb-2">🍃 Leaf Density</label>
                    <input type="range" id="leafSlider" min="0" max="1" step="0.05" value="0.70" class="range range-leaf w-full">
                    <div class="flex justify-between text-xs text-gray-400 mt-1">
                        <span>0%</span>
                        <span id="leafValue">70%</span>
                        <span>100%</span>
                    </div>
                </div>

                <!-- Fruit Spawn Rate -->
                <div class="bg-gray-700 bg-opacity-50 p-3 rounded-lg">
                    <label class="block text-sm font-medium text-gray-300 mb-2">🍎 Fruit Spawn Rate</label>
                    <input type="range" id="fruitSlider" min="0" max="1" step="0.05" value="0.30" class="range range-secondary w-full">
                    <div class="flex justify-between text-xs text-gray-400 mt-1">
                        <span>0%</span>
                        <span id="fruitValue">30%</span>
                        <span>100%</span>
                    </div>
                </div>

                <!-- Stone Spawn Rate -->
                <div class="bg-gray-700 bg-opacity-50 p-3 rounded-lg">
                    <label class="block text-sm font-medium text-gray-300 mb-2">🗿 Stone Spawn Rate</label>
                    <input type="range" id="stoneSlider" min="0" max="1" step="0.05" value="0.15" class="range range-accent w-full">
                    <div class="flex justify-between text-xs text-gray-400 mt-1">
                        <span>0%</span>
                        <span id="stoneValue">15%</span>
                        <span>100%</span>
                    </div>
                </div>

                <!-- Cave Spawn Rate -->
                <div class="bg-gray-700 bg-opacity-50 p-3 rounded-lg">
                    <label class="block text-sm font-medium text-gray-300 mb-2">🕳️ Cave Spawn Rate</label>
                    <input type="range" id="caveSlider" min="0" max="0.5" step="0.05" value="0.10" class="range range-info w-full">
                    <div class="flex justify-between text-xs text-gray-400 mt-1">
                        <span>0%</span>
                        <span id="caveValue">10%</span>
                        <span>50%</span>
                    </div>
                </div>
            </div>
            <button id="regenerateButton" class="btn btn-primary mt-3 px-6 py-2 font-bold">
                🔄 Regenerate World
            </button>
        </div>
    </div>
    <div id="game-container" class="relative w-full max-w-6xl flex justify-center mb-6" data-aos="zoom-in" data-aos-delay="200">
        <div class="relative w-full max-w-5xl card p-6">
            <canvas id="gameCanvas" width="800" height="600" style="background:#222; border-radius:1rem; display:block;"></canvas>
            <canvas id="minimapCanvas" width="96" height="96" class="absolute top-6 right-6" style="background:#111; border-radius:0.5rem; display:block;"></canvas>
        </div>
    </div>
    <div id="messageBox" class="hidden fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 p-8 rounded-2xl shadow-2xl z-50" data-aos="fade-in" data-aos-delay="300">
        <p id="messageText" class="text-xl font-bold mb-6"></p>
        <button id="messageBoxCloseBtn" class="btn w-full px-6 py-3 font-bold transition-all duration-200">Close</button>
    </div>
    <script>
        // Only UI initialization and AOS setup should be here
        document.addEventListener('DOMContentLoaded', function() {
            AOS.init({ once: true });
        });
        // All game logic is now in game.js
    </script>
</body>
</html>
